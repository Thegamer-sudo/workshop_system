{% extends 'base.html' %}
{% block title %}Reset Password — Student Workshop{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-card-header">
      <h2>Create New Password</h2>
      <p>Enter your new password below</p>
    </div>

    <div class="auth-card-body">
      <form method="POST" action="{{ url_for('reset_password', token=token) }}">

        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password"
              placeholder="Enter new password"
              required minlength="8" maxlength="16"/>
            <button type="button" class="password-toggle" id="togglePassword"
              style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="form-hint">8 to 16 characters.</div>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm_password" name="confirm_password"
              placeholder="Repeat your password"
              required minlength="8" maxlength="16"/>
            <button type="button" class="password-toggle" id="toggleConfirm"
              style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <p id="matchMessage" class="form-hint" style="margin-top:0.3rem;"></p>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Reset Password
        </button>

      </form>

      <div style="margin-top: 1.5rem; text-align: center;">
        <a href="{{ url_for('login') }}" style="font-size: 0.85rem; color: var(--teal);">
          Back to Sign In
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function makeToggle(btnId, inputId) {
    document.getElementById(btnId).addEventListener('click', () => {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  }
  makeToggle('togglePassword', 'password');
  makeToggle('toggleConfirm', 'confirm_password');

  const pw = document.getElementById('password');
  const confirm = document.getElementById('confirm_password');
  const matchMsg = document.getElementById('matchMessage');

  function checkMatch() {
    if (!confirm.value) { matchMsg.textContent = ''; return; }
    if (pw.value === confirm.value) {
      matchMsg.textContent = 'Passwords match';
      matchMsg.style.color = '#22c55e';
    } else {
      matchMsg.textContent = 'Passwords do not match';
      matchMsg.style.color = '#ef4444';
    }
  }

  confirm.addEventListener('input', checkMatch);
  pw.addEventListener('input', checkMatch);

  document.querySelector('form').addEventListener('submit', (e) => {
    if (pw.value !== confirm.value) {
      e.preventDefault();
      matchMsg.textContent = 'Passwords do not match';
      matchMsg.style.color = '#ef4444';
      confirm.focus();
    }
  });
</script>
{% endblock %}
